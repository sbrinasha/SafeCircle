<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeCircle - Kiko AI</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config for Custom Colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'orange-pastel': '#FFD4B3',
                        'orange-accent': '#FF8C42',
                        'orange-dark': '#FF6B35',
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles/style.css">

    <!-- Navbar Script -->
    <script src="script/navbar.js"></script>

    <style>
        #chat-messages {
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .message-user {
            animation: slide-in-right 0.3s ease-out;
        }

        .message-kiko {
            animation: slide-in-left 0.3s ease-out;
        }

        @keyframes slide-in-right {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slide-in-left {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-orange-pastel via-orange-100 to-white min-h-screen flex items-center justify-center md:py-5 p-0">

    <div class="main-container">
        <!-- Card Container -->
        <div class="app-shell flex flex-col h-screen md:h-auto pb-24">

            <!-- Header -->
            <div
                class="bg-gradient-to-r from-orange-accent to-orange-dark text-white rounded-b-2xl p-4 space-y-1 -mx-6 sm:-mx-8 px-6 sm:px-8 shrink-0">
                <h1 class="text-2xl font-bold">Kiko AI</h1>
                <p class="text-sm text-orange-100">Your scam safety assistant</p>
            </div>

            <!-- Chat Messages -->
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3">
                <!-- Initial message from Kiko -->
                <div class="message-kiko flex gap-2">
                    <div class="flex-shrink-0">
                        <div
                            class="w-8 h-8 rounded-full bg-orange-pastel flex items-center justify-center overflow-hidden">
                            <img src="img/safecircle.png" alt="Kiko" class="w-full h-full object-cover">
                        </div>
                    </div>
                    <div class="flex-1 max-w-xs bg-gray-100 rounded-lg p-3">
                        <p class="text-sm text-gray-800">Hi! I'm Kiko, your scam safety assistant. I'm here to help
                            answer questions about your case and provide guidance. How can I help you?</p>
                        <p class="text-xs text-gray-500 mt-1">Just now</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="border-t border-gray-200 bg-white p-3 shrink-0">
                <div class="flex gap-2">
                    <input id="message-input" type="text" placeholder="Ask Kiko..."
                        class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-accent focus:ring-1 focus:ring-orange-accent" />
                    <button id="send-btn"
                        class="bg-orange-accent hover:bg-orange-dark text-white px-4 py-2 rounded-lg transition-colors font-semibold text-sm">
                        Send
                    </button>
                </div>
            </div>

            <!-- Navbar Container -->
            <div id="navbar-container"></div>
        </div>
    </div>

    <!-- Initialize Navbar -->
    <script>
        renderNavbar('navbar-container', 'kiko');

        // API Configuration
        const KIKO_API_KEY = 'sk-proj-placeholder-api-key-for-demo';

        // Chat functionality
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        const kikoResponses = [
            "That sounds concerning. Have you contacted your bank yet? They can help freeze your account immediately.",
            "I'm sorry you're going through this. Remember, most banks cover unauthorized transactions. You should be covered.",
            "Good question. It's important to change all your passwords as soon as possible, especially for banking and email accounts.",
            "Document everything - keep records of all communications, transactions, and any evidence. This helps with fraud claims.",
            "If you haven't already, file a report with your local police department. This creates an official record.",
            "Your bank typically has 24-48 hours to respond to fraud claims. They'll investigate and likely issue a refund.",
            "Stay vigilant and monitor your accounts closely. Set up fraud alerts with the credit bureaus if you haven't already.",
            "You're doing the right thing by reporting this quickly. That significantly improves your chances of recovery."
        ];

        function addMessage(text, isUser) {
            const messageEl = document.createElement('div');
            messageEl.className = `flex gap-2 ${isUser ? 'justify-end' : ''}`;

            if (isUser) {
                messageEl.innerHTML = `
                    <div class="flex-1 max-w-xs bg-orange-accent text-white rounded-lg p-3 message-user">
                        <p class="text-sm">${text}</p>
                        <p class="text-xs text-orange-100 mt-1">Just now</p>
                    </div>
                `;
            } else {
                messageEl.innerHTML = `
                    <div class="flex-shrink-0">
                        <div class="w-8 h-8 rounded-full bg-orange-pastel flex items-center justify-center">
                            <img src="img/safecircle.png" alt="Kiko" class="w-5 h-5">
                        </div>
                    </div>
                    <div class="flex-1 max-w-xs bg-gray-100 rounded-lg p-3 message-kiko">
                        <p class="text-sm text-gray-800">${text}</p>
                        <p class="text-xs text-gray-500 mt-1">Just now</p>
                    </div>
                `;
            }

            chatMessages.appendChild(messageEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            messageInput.value = '';
            sendBtn.disabled = true;
            sendBtn.textContent = 'Thinking...';

            // Simulate response delay
            setTimeout(() => {
                const randomResponse = kikoResponses[Math.floor(Math.random() * kikoResponses.length)];
                addMessage(randomResponse, false);
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
            }, 800);
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>

</html>
