<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeCircle - Blog</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 
    <style>
        * {
            outline: 1px solid red !important;
        }
    </style> -->

    <!-- Tailwind Config for Custom Colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'orange-pastel': '#FFD4B3',
                        'orange-accent': '#FF8C42',
                        'orange-dark': '#FF6B35',
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles/style.css">

    <!-- Navbar Script -->
    <script src="script/navbar.js"></script>
</head>

<body
    class="bg-gradient-to-br from-orange-pastel via-orange-100 to-white min-h-screen flex items-center justify-center md:py-5 p-0">

    <div class="main-container">
        <!-- Card Container -->
        <div class="app-shell">

            <!-- Header -->
            <div
                class="bg-gradient-to-r from-orange-accent to-orange-dark text-white rounded-b-2xl p-6 space-y-1 -mx-6 sm:-mx-8 px-6 sm:px-8">
                <h1 class="text-2xl font-bold">Blog</h1>
                <p class="text-sm text-orange-100">Latest updates and articles</p>
            </div>

            <!-- Navbar Container -->
            <div id="navbar-container"></div>
        </div>
    </div>

    <!-- Initialize Navbar -->
    <script>
        renderNavbar('navbar-container', 'circle');

        // Toggle Switch Handler
        document.querySelectorAll('.toggle-switch').forEach(button => {
            button.addEventListener('click', function () {
                this.classList.toggle('active');
                const state = this.classList.contains('active') ? 'on' : 'off';
                this.setAttribute('data-state', state);
            });
        });
    </script>
</body>

</html>
