<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeCircle - Login</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config for Custom Colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'orange-pastel': '#FFD4B3',
                        'orange-accent': '#FF8C42',
                        'orange-dark': '#FF6B35',
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body
    class="bg-gradient-to-br from-orange-pastel via-orange-100 to-white min-h-screen flex items-center justify-center p-0 sm:p-4">

    <div class="w-full sm:max-w-md relative z-10">
        <!-- Card Container -->
        <div
            class="bg-white rounded-none sm:rounded-3xl shadow-none sm:shadow-2xl p-6 sm:p-8 md:p-12 space-y-8 min-h-screen sm:min-h-auto flex flex-col sm:flex-col justify-center">

            <!-- Logo Placeholder -->
            <div class="flex justify-center">
                <div
                    class="w-24 h-24 bg-gradient-to-br from-orange-accent to-orange-dark rounded-2xl flex items-center justify-center shadow-lg transform hover:scale-105 transition-transform duration-300">
                    <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12l2 2 4-4m7.5-1.5A9 9 0 1112 3a8.966 8.966 0 017.5 9.5z"></path>
                    </svg>
                </div>
            </div>

            <!-- Title -->
            <div class="text-center space-y-2">
                <h1 class="text-3xl md:text-4xl font-bold text-gray-800">SafeCircle</h1>
                <p class="text-gray-500">Welcome back! Please login to your account</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-5">
                <!-- Email Field -->
                <div class="space-y-2">
                    <label for="email" class="block text-sm font-semibold text-gray-700">Email Address</label>
                    <input type="text" id="email" placeholder="you@example.com"
                        class="w-full px-4 py-3 rounded-xl border-2 border-orange-pastel focus:border-orange-accent focus:outline-none transition-colors duration-200 bg-orange-50/50">
                </div>

                <!-- Password Field -->
                <div class="space-y-2">
                    <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
                    <input type="password" id="password" placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-xl border-2 border-orange-pastel focus:border-orange-accent focus:outline-none transition-colors duration-200 bg-orange-50/50">
                </div>

                <!-- Remember & Forgot -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center space-x-2 cursor-pointer group">
                        <input type="checkbox" class="w-4 h-4 rounded accent-orange-accent" />
                        <span class="text-gray-600 group-hover:text-orange-accent transition-colors">Remember me</span>
                    </label>
                    <a href="#" class="text-orange-accent hover:text-orange-dark font-medium transition-colors">Forgot
                        password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit"
                    class="w-full bg-gradient-to-r from-orange-accent to-orange-dark text-white font-bold py-3 px-4 rounded-xl hover:shadow-lg transform hover:-translate-y-1 transition-all duration-200 mt-8">
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t-2 border-orange-pastel"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500">Or continue with</span>
                </div>
            </div>

            <!-- Social Login Buttons -->
            <div class="grid grid-cols-2 gap-4">
                <button
                    class="flex items-center justify-center space-x-2 border-2 border-orange-pastel rounded-xl py-2.5 hover:bg-orange-50 transition-colors duration-200">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12.545,10.852v3.608h5.337c-0.676,2.636-2.904,4.605-5.337,4.605c-3.368,0-6.007-2.639-6.007-5.91 c0-3.271,2.639-5.910,6.007-5.910c1.616,0,3.109,0.631,4.266,1.659l2.934-2.934C18.88,2.009,15.9,0.749,12.545,0.749 c-6.305,0-11.396,5.091-11.396,11.396c0,6.305,5.091,11.396,11.396,11.396c10.065,0,11.296-9.367,10.666-13.646H12.545Z" />
                    </svg>
                </button>
                <button
                    class="flex items-center justify-center space-x-2 border-2 border-orange-pastel rounded-xl py-2.5 hover:bg-orange-50 transition-colors duration-200">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                    </svg>
                </button>
            </div>

            <!-- Sign Up Link -->
            <p class="text-center text-gray-600">
                Don't have an account?
                <a href="#" class="text-orange-accent hover:text-orange-dark font-semibold transition-colors">Sign
                    up</a>
            </p>
        </div>

    </div>

    <!-- Custom Script -->
    <script src="script/javascript.js"></script>
    <script>
        init_login_page();
    </script>
</body>

</html>
